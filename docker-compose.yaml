version: '3.8'

services:
  postgres:
    image: ghcr.io/tensorchord/vchord-postgres:pg18-v0.5.3
    container_name: postgres_server
    environment:
      - POSTGRES_USER=${ADMIN_POSTGRES_USER}
      - POSTGRES_PASSWORD=${ADMIN_POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - APP_USER=${POSTGRES_USER}
      - APP_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh:ro
    restart: unless-stopped
    networks:
      - agent-network

  redis:
    image: redis:7-alpine
    container_name: redis_server
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      sh -c '
      if [ -n "$${REDIS_PASSWORD}" ]; then
        redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
      else
        redis-server --appendonly yes
      fi
      '
    restart: unless-stopped
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: azurite_storage
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --loose --skipApiVersionCheck
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data
    restart: unless-stopped
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
     build:
       context: ./agent-studio-backend
       dockerfile: dockerfile
     container_name: agent_studio_backend
     env_file: .env
     environment:
       # Docker-specific overrides (these take precedence over .env values)
       # Database: use Docker service names instead of localhost
       - DATABASE_HOST=postgres
       - DATABASE_PRIMARY_HOST=postgres
       - POSTGRES_SSL=false
       # Redis: use Docker service name instead of localhost
       - REDIS_HOST=redis
       # Azure Storage: point to azurite container instead of localhost
       - AZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;
       # Langfuse: point to langfuse container if running (instead of localhost)
       - LANGFUSE_HOST=http://langfuse:3000
     ports:
       - "8000:8000"
     volumes:
       - ./agent-studio-backend/logs:/app/logs
     depends_on:
       - postgres
       - redis
       - azurite
     restart: unless-stopped
     networks:
       - agent-network
     healthcheck:
       test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
       interval: 30s
       timeout: 10s
       retries: 3
       start_period: 40s
  frontend:
     build:
       context: ./agent-studio-frontend
       dockerfile: Dockerfile
       args:
         - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
     container_name: agent_studio_frontend
     ports:
       - "81:81"
     depends_on:
       - backend
     restart: unless-stopped
     networks:
       - agent-network
     healthcheck:
       test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
       interval: 30s
       timeout: 10s
       retries: 3
       start_period: 10s
